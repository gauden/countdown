name: Deploy Countdown

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-countdown-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to Molly
    runs-on: ubuntu-latest
    env:
      DEPLOY_ROOT: /srv/www/countdown
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Prepare SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload release payload
        run: |
          set -euo pipefail
          tar -czf countdown-release.tgz out ops/deploy/deploy_countdown.sh
          scp -P "${DEPLOY_PORT}" countdown-release.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/countdown-release.tgz"

      - name: Deploy on VM
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            rm -rf /tmp/countdown-release
            mkdir -p /tmp/countdown-release
            tar -xzf /tmp/countdown-release.tgz -C /tmp/countdown-release
            chmod +x /tmp/countdown-release/ops/deploy/deploy_countdown.sh
            GITHUB_SHA='${GITHUB_SHA}' BUILD_DIR=/tmp/countdown-release/out DEPLOY_ROOT='${DEPLOY_ROOT}' /tmp/countdown-release/ops/deploy/deploy_countdown.sh
          "

      - name: Verify deployed index
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "test -f /srv/www/countdown/current/index.html && echo OK"
